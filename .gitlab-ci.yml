stages:
  - infra
  - build
  - push
  - deploy
  - frontend

variables:
  ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
  IMAGE_NAME: "three-tier-backend"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  TF_ROOT: "Terraform"

terraform_infra:
  stage: infra
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  before_script:
    - cd ${TF_ROOT}
    - terraform init -reconfigure
  script:
    - terraform apply -target=module.ecr -auto-approve -lock-timeout=300s
  only:
    - main

build_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t ${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} Three_tier_cloud_project/backend/
    - docker save ${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} > backend_image.tar
  artifacts:
    paths:
      - backend_image.tar
    expire_in: 1 hour

vulnerability_scan:
  stage: build
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: ["build_image"]
  before_script:
    - apk add --no-cache aws-cli
  script:
    - trivy image --input backend_image.tar --severity HIGH,CRITICAL --format json --output vulnerability_report.json
    - aws s3 cp vulnerability_report.json s3://three-tier-aws-tf-scan-report/reports/${CI_COMMIT_SHORT_SHA}_vulnerability_report.json
    - trivy image --input backend_image.tar --severity HIGH,CRITICAL --exit-code 0
  artifacts:
    paths:
      - vulnerability_report.json
    expire_in: 1 week
  allow_failure: true

push_to_ecr:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  needs: ["build_image", "terraform_infra"]
  before_script:
    - apk add --no-cache aws-cli
    - aws sts get-caller-identity
    # Hardcode us-east-1 here too
    - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${ECR_REGISTRY}
  script:
    - docker load < backend_image.tar
    - docker push ${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
    - docker tag ${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} ${ECR_REGISTRY}/${IMAGE_NAME}:latest
    - docker push ${ECR_REGISTRY}/${IMAGE_NAME}:latest

terraform_deploy:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  needs: ["push_to_ecr"]
  before_script:
    - apk add --no-cache jq
    - cd ${TF_ROOT}
    - terraform init
  script:
    - terraform apply -auto-approve -var="backend_image_tag=${IMAGE_TAG}" -lock-timeout=300s
    # Extract outputs to text files for the frontend stage
    - terraform output -raw primary_alb_dns > ../alb_dns.txt
    - terraform output -raw s3_frontend_bucket_id > ../s3_bucket.txt
    - terraform output -json cloudfront_distribution_ids | jq -r 'to_entries | .[0].value' > ../cf_id.txt
  artifacts:
    paths:
      - alb_dns.txt
      - s3_bucket.txt
      - cf_id.txt
  only:
    - main

frontend_deploy:
  stage: frontend
  image: node:20-alpine
  needs: ["terraform_deploy"]
  before_script:
    - apk add --no-cache aws-cli
  script:
    - export ALB_URL="http://$(cat alb_dns.txt)"
    - export S3_BUCKET=$(cat s3_bucket.txt)
    - export CF_ID=$(cat cf_id.txt)
    - cd Three_tier_cloud_project/frontend
    
    # 1. Inject the dynamic API Endpoint
    - echo "REACT_APP_API_BASE_URL=${ALB_URL}" > .env
    
    # 2. Build the Static Application
    - npm install
    - npm run build
    
    # 3. Deploy to S3 completely wiping old files
    - aws s3 sync build/ s3://${S3_BUCKET}/ --delete
    
    # 4. Invalidate CloudFront cache so clients see instant update
    - |
      if [ "$CF_ID" != "null" ] && [ -n "$CF_ID" ]; then
        aws cloudfront create-invalidation --distribution-id ${CF_ID} --paths "/*"
      fi
  only:
    - main
